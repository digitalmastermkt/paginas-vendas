<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap');
  @page { size: 1080px 1080px; margin:0; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { width:1080px; height:1080px; }
  body { width:1080px; height:1080px; overflow:hidden; }
  .card {
    width:1080px; height:1080px; position:relative; overflow:hidden;
    background:radial-gradient(circle at 50% 42%, #2a2c30 0%, #1c1d20 46%, #131416 100%);
    font-family:'Montserrat', sans-serif;
  }
  .watermark {
    position:absolute; top:calc(50% - 30px); left:50%; transform:translate(-50%,-50%);
    height:800px; z-index:0; pointer-events:none;
  }
  .content {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-54%);
    z-index:2; width:940px; text-align:center;
  }
  .line {
    color:#FFFFFF; font-weight:600; line-height:1.24; letter-spacing:0.3px;
    font-size:86px; text-shadow:0 2px 12px rgba(0,0,0,0.5);
  }
  .gold {
    font-weight:800; letter-spacing:1px; color:#E7C887;
    background:linear-gradient(180deg,#F6E4B0 0%,#E3BE72 48%,#C99A48 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 28px rgba(226,190,114,0.5);
    filter:drop-shadow(0 0 16px rgba(226,190,114,0.4));
  }
  .footer {
    position:absolute; bottom:72px; left:0; right:0; z-index:3;
    text-align:center;
  }
  .footer img { height:66px; opacity:0.92; display:block; margin:0 auto 14px; }
  .handle { color:#9a9a9a; font-weight:500; font-size:26px; letter-spacing:1.2px; }
</style>
